name: Unit Tests
on:
  push:
    paths: ["**.swift"]
    branches: [main]
  pull_request:
    paths: ["**.swift"]
    branches: [main]
  workflow_dispatch:
jobs:
  unit_tests:
    name: Unit Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: 5.10.1
      - name: Run Unit Tests
        run: swift test
